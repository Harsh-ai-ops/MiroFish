services:
  - type: web
    name: mirofish-backend
    runtime: python
    region: oregon
    plan: free
    buildCommand: |
      cd backend && uv pip install -r requirements.txt --system
    startCommand: |
      cd backend && gunicorn --bind 0.0.0.0:$PORT --workers 1 --threads 4 --timeout 300 --preload wsgi:app
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.11"
      - key: FLASK_DEBUG
        value: "False"
      - key: LLM_API_KEY
        sync: false
      - key: LLM_BASE_URL
        sync: false
      - key: LLM_MODEL_NAME
        sync: false
      - key: ZEP_API_KEY
        sync: false
      - key: LLM_BOOST_API_KEY
        sync: false
      - key: LLM_BOOST_BASE_URL
        sync: false
      - key: LLM_BOOST_MODEL_NAME
        sync: false
    healthCheckPath: /health
